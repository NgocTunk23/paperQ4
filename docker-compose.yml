version: '3.8'
services:
  traffic-app:
    build: .
    image: hcmc-traffic-bot:latest
    container_name: traffic-bot-1
    restart: unless-stopped
    volumes:
      - ./:/app

  web_frontend:
    image: python:3.9-slim
    container_name: cityflow_frontend
    ports:
      - "8080:8000"
    volumes:
      - ./:/app
    working_dir: /app
    command: python3 -m http.server 8000